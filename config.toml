# 数据卡尔实验室 - PaperMod主题配置
baseURL = "https://cuiyanxiang.github.io/data-karl-lab/"
languageCode = "zh-cn"
title = "数据卡尔实验室"
theme = "PaperMod"

defaultContentLanguage = "zh"
defaultContentLanguageInSubdir = false
hasCJKLanguage = true

[author]
  name = "卡尔"
  email = "karl@karl-tech.com"

# 站点参数
[params]
  # 基础信息
  description = "大数据技术专家卡尔的技术博客 - Spark优化、金融数据分析、一人公司创业实践"
  
  # 首页配置 - 使用正确的PaperMod格式
  homeInfoParams = { Title = "数据卡尔实验室", Content = "欢迎来到我的技术博客！我是卡尔，一名大数据架构师和技术创业者。这里分享我在Spark优化、金融数据分析、技术创业等方面的实战经验。" }
  
  # 社交链接
  socialIcons = [
    { name = "github", url = "https://github.com/CuiYanxiang" },
    { name = "rss", url = "/index.xml" }
  ]
  
  # 功能开关
  search = true
  
  # 评论系统（可选）
  [params.comments]
    enabled = false

# 菜单配置 - PaperMod标准格式
[menu]
  [[menu.main]]
    identifier = "posts"
    name = "技术文章"
    url = "/posts/"
    weight = 1
    
  [[menu.main]]
    identifier = "about"
    name = "关于"
    url = "/about/"
    weight = 2

# 输出配置
[outputs]
  home = ["HTML", "RSS"]

# 分类和标签
[taxonomies]
  category = "categories"
  tag = "tags"

# 构建配置
[build]
  useResourceCacheWhen = "fallback"

# Sitemap配置
[sitemap]
  changefreq = "weekly"
  filename = "sitemap.xml"
  priority = 0.5

# 安全头
[security]
  [security.exec]
    allow = ['^dart-sass-embedded$', '^go$', '^npx$', '^postcss$']# 数据卡尔实验室 - 优化配置

# SEO优化配置
[params.seo]
  twitter = "@karl_tech"
  opengraph = true
  twittercards = true

# 分析工具配置（需要时启用）
[services.googleAnalytics]
  id = "UA-XXXXX-X"  # 替换为你的GA ID

# 评论系统配置（可选）
[params.comments]
  enabled = true
  provider = "utterances"
  
  [params.comments.utterances]
    repo = "CuiYanxiang/data-karl-lab"
    issueTerm = "pathname"
    theme = "github-light"
    label = "comment"

# 社交分享配置
[params.share]
  enabled = true
  
# 代码高亮优化
[markup.highlight]
  codeFences = true
  guessSyntax = true
  lineNos = true
  lineNumbersInTable = false
  noClasses = false

# 数学公式支持
[params.math]
  enabled = true

# 阅读进度条
[params.readingTime]
  enabled = true

# 文章目录
[params.toc]
  enabled = true
  keepStatic = false

# 自定义CSS优化
[params.extend]
  customCSS = ["/css/custom.css"]
  
# 邮件订阅（可选）
[params.subscription]
  enabled = false

# 搜索优化
[params.search]
  enabled = true
  type = "fuse"

# 图片懒加载
[params.lazyLoad]
  enabled = true