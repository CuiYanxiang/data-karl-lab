name: Deploy Hugo Site

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

  # 允许手动触发部署
  workflow_dispatch:

# 设置权限
permissions:
  contents: write

jobs:
  # 构建作业
  build:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.128.0'
          extended: true

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with Hugo
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
        run: |
          hugo \
            --gc \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  # 部署作业
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # 测试作业（可选）
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.128.0'
          extended: true

      - name: Lint Markdown
        uses: actionshub/markdownlint@2
        with:
          config_file: .github/workflows/markdownlint.yaml
          args: '**/*.md'

      - name: Build Test
        run: hugo --minify

      - name: Check for broken links
        uses: lycheeverse/lychee-action@v2
        with:
          args: 'public/**/*.html --verbose'
          fail: true

# 缓存配置
cache:
  key: ${{ runner.os }}-hugo-${{ hashFiles('**/go.sum') }}
  paths:
    - ~/go/pkg/mod