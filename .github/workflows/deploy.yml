name: Deploy Hugo Site - Ultimate Fix

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout with full history
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0  # 获取完整历史记录

      - name: Clear any Hugo cache
        run: |
          rm -rf ~/.cache/hugo 2>/dev/null || true
          rm -rf themes 2>/dev/null || true
          rm -f go.sum 2>/dev/null || true
          # 特别清除ananke主题残留
          find . -name "*ananke*" -type d -exec rm -rf {} \; 2>/dev/null || true
          echo "✅ 已清除所有Hugo缓存和ananke残留"

      - name: Setup Hugo (latest extended)
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.156.0'
          extended: true

      - name: Initialize go module
        run: |
          # 确保go.mod存在
          if [ ! -f "go.mod" ]; then
            echo "module github.com/CuiYanxiang/data-karl-lab" > go.mod
            echo "go 1.19" >> go.mod
          fi
          
          # 下载所有依赖
          hugo mod get -u 2>/dev/null || echo "模块更新跳过"
          echo "✅ Go模块初始化完成"

      - name: Build with Hugo (verbose)
        env:
          HUGO_ENV: production
        run: |
          echo "=== 开始构建 ==="
          echo "当前目录:"
          pwd
          ls -la
          
          echo "=== 检查主题 ==="
          ls -la themes/ 2>/dev/null || echo "themes目录不存在"
          echo "强制确保使用PaperMod主题..."
          # 删除任何ananke主题文件
          find themes/ -name "*ananke*" -exec rm -rf {} \; 2>/dev/null || true
          # 确保config.toml使用PaperMod
          sed -i 's/theme = ".*"/theme = "PaperMod"/' config.toml
          
          echo "=== 检查配置 ==="
          grep -n "theme" config.toml
          
          echo "=== 构建过程 ==="
          # 使用详细模式构建
          hugo \
            --gc \
            --minify \
            --verbose \
            --baseURL "https://cuiyanxiang.github.io/data-karl-lab/" \
            --destination ./public
          
          echo "=== 构建结果 ==="
          if [ -f "public/index.html" ]; then
            echo "✅ 构建成功！生成index.html"
            ls -la public/ | head -5
          else
            echo "❌ 构建失败：未生成index.html"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4